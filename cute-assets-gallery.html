<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>温暖可爱资产画册（手绘风）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #f6efe2;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      // =========================
      // 手绘风工具（移植自 shadow-town.html 的精简版）
      // =========================
      const STYLE = {
        bg: [248, 238, 220],
        ink: [60, 40, 30],
        inkSoft: [90, 70, 55],
        card: [255, 255, 255, 220],
        cardStroke: [255, 255, 255, 140],
        strokeW: 2.2,
        jitter: 1.2,
        polySeg: 3,
      };

      function lerpArr(a, b, t) {
        return a.map((v, i) => v + (b[i] - v) * t);
      }

      function subdivideLine(x1, y1, x2, y2, segments = 3, jitter = 1.2, extend = 1.5, dynamic = false) {
        const pts = [];
        const dx = x2 - x1,
          dy = y2 - y1;
        const len = sqrt(dx * dx + dy * dy);
        if (len === 0) return [x1, y1, x2, y2];
        const ux = dx / len,
          uy = dy / len;
        const startX = x1 - ux * extend,
          startY = y1 - uy * extend;
        const endX = x2 + ux * extend,
          endY = y2 + uy * extend;
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          let x = lerp(startX, endX, t);
          let y = lerp(startY, endY, t);
          if (i > 0 && i < segments) {
            if (dynamic) {
              x += (noise(x * 0.02, y * 0.02, frameCount * 0.01) - 0.5) * 2 * jitter;
              y += (noise(x * 0.02 + 100, y * 0.02 + 100, frameCount * 0.01) - 0.5) * 2 * jitter;
            } else {
              x += random(-jitter, jitter);
              y += random(-jitter, jitter);
            }
          }
          pts.push(x, y);
        }
        return pts;
      }

      function subdividePolygon(vertices, segments = 3, jitter = 1.2, dynamic = false) {
        const pts = [];
        for (let i = 0; i < vertices.length; i++) {
          const p1 = vertices[i];
          const p2 = vertices[(i + 1) % vertices.length];
          for (let j = 0; j < segments; j++) {
            const t = j / segments;
            let x = lerp(p1.x, p2.x, t);
            let y = lerp(p1.y, p2.y, t);
            if (j > 0) {
              if (dynamic) {
                x += (noise(x * 0.02, y * 0.02, frameCount * 0.01) - 0.5) * 2 * jitter;
                y += (noise(x * 0.02 + 100, y * 0.02 + 100, frameCount * 0.01) - 0.5) * 2 * jitter;
              } else {
                x += random(-jitter, jitter);
                y += random(-jitter, jitter);
              }
            }
            pts.push(x, y);
          }
        }
        return pts;
      }

      function drawSketchyPoly(pts, strokeCol, fillCol, weight = STYLE.strokeW) {
        if (fillCol) fill(...fillCol);
        else noFill();
        if (strokeCol) {
          stroke(...strokeCol);
          strokeWeight(weight);
          strokeJoin(ROUND);
          strokeCap(ROUND);
        } else noStroke();
        beginShape();
        for (let i = 0; i < pts.length; i += 2) vertex(pts[i], pts[i + 1]);
        endShape(CLOSE);
      }

      function drawSketchyLineSegments(pts, strokeCol, weight = STYLE.strokeW) {
        if (strokeCol) {
          stroke(...strokeCol);
          strokeWeight(weight);
          strokeJoin(ROUND);
          strokeCap(ROUND);
        } else noStroke();
        noFill();
        beginShape();
        for (let i = 0; i < pts.length; i += 2) vertex(pts[i], pts[i + 1]);
        endShape();
      }

      function skLine(x1, y1, x2, y2, w = STYLE.strokeW, j = STYLE.jitter) {
        drawSketchyLineSegments(subdivideLine(x1, y1, x2, y2, 3, j, 1.2), STYLE.ink, w);
      }

      function skPoly(points, fillCol, strokeCol = STYLE.ink, w = STYLE.strokeW, seg = STYLE.polySeg, j = STYLE.jitter) {
        drawSketchyPoly(subdividePolygon(points, seg, j), strokeCol, fillCol, w);
      }

      function skEllipse(x, y, rx, ry, fillCol, strokeCol = STYLE.ink, w = STYLE.strokeW) {
        const pts = [];
        const n = 18;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * TWO_PI;
          const j = (noise(i * 0.3, rx * 0.02, ry * 0.02) - 0.5) * STYLE.jitter;
          pts.push({ x: x + cos(a) * (rx + j), y: y + sin(a) * (ry + j) });
        }
        skPoly(pts, fillCol, strokeCol, w, 2, 0.8);
      }

      function cuteFace(x, y, s, mood = 0) {
        // mood: -1 sad, 0 neutral, 1 happy
        const eyeY = y - 2 * s;
        noStroke();
        fill(40, 30, 25, 230);
        ellipse(x - 5 * s, eyeY, 2.4 * s, 3.2 * s);
        ellipse(x + 5 * s, eyeY, 2.4 * s, 3.2 * s);
        fill(255, 170, 170, 120);
        ellipse(x - 8 * s, y + 2 * s, 5.2 * s, 3.6 * s);
        ellipse(x + 8 * s, y + 2 * s, 5.2 * s, 3.6 * s);
        stroke(...STYLE.inkSoft);
        strokeWeight(1.4 * s);
        noFill();
        const mY = y + 6 * s;
        if (mood >= 1) arc(x, mY, 10 * s, 7 * s, 0, PI);
        else if (mood <= -1) arc(x, mY + 4 * s, 10 * s, 7 * s, PI, TWO_PI);
        else line(x - 4.5 * s, mY, x + 4.5 * s, mY);
      }

      function ribbonBow(x, y, s, col) {
        skEllipse(x, y, 3.2 * s, 2.2 * s, col, STYLE.ink, 1.6);
        skEllipse(x - 4.2 * s, y, 4.2 * s, 2.8 * s, col, STYLE.ink, 1.6);
        skEllipse(x + 4.2 * s, y, 4.2 * s, 2.8 * s, col, STYLE.ink, 1.6);
      }

      // =========================
      // 资产绘制（40 个）
      // 坐标约定：以 (0,0) 为中心，建议绘制范围 ~[-30..30]
      // =========================
      const PAL = {
        cream: [255, 248, 235],
        cocoa: [170, 120, 95],
        caramel: [232, 180, 95],
        honey: [245, 205, 110],
        blush: [255, 190, 190],
        sky: [190, 220, 245],
        mint: [170, 215, 190],
        leaf: [120, 165, 110],
        red: [210, 95, 80],
        pink: [245, 160, 175],
        blue: [120, 165, 215],
        gray: [160, 165, 175],
      };

      function drawSheep({ s, hovered }) {
        skEllipse(0, 6 * s, 20 * s, 14 * s, PAL.cream, STYLE.ink, hovered ? 2.8 : 2.2);
        for (let i = 0; i < 6; i++) skEllipse((-14 + i * 6) * s, (i % 2 ? 0 : -2) * s, 8 * s, 6 * s, PAL.cream, null, 0);
        skEllipse(0, 8 * s, 10 * s, 8 * s, PAL.cocoa, STYLE.ink, 2.0);
        cuteFace(0, 10 * s, 0.55 * s, 1);
        skLine(-10 * s, 16 * s, -10 * s, 22 * s, 2.8, 0.8);
        skLine(10 * s, 16 * s, 10 * s, 22 * s, 2.8, 0.8);
      }

      function drawPuppy({ s, hovered }) {
        skEllipse(0, 6 * s, 18 * s, 14 * s, PAL.caramel, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(-10 * s, 2 * s, 8 * s, 10 * s, PAL.cocoa, STYLE.ink, 2.0);
        skEllipse(10 * s, 2 * s, 8 * s, 10 * s, PAL.cocoa, STYLE.ink, 2.0);
        skEllipse(0, 10 * s, 11 * s, 9 * s, PAL.honey, STYLE.ink, 2.0);
        cuteFace(0, 11 * s, 0.6 * s, 1);
        noStroke();
        fill(220, 90, 110, 200);
        ellipse(0, 16 * s, 5 * s, 3.2 * s);
      }

      function drawKitty({ s, hovered }) {
        skEllipse(0, 6 * s, 18 * s, 14 * s, PAL.cream, STYLE.ink, hovered ? 2.8 : 2.2);
        skPoly(
          [
            { x: -10 * s, y: 2 * s },
            { x: -2 * s, y: -6 * s },
            { x: -1 * s, y: 4 * s },
          ],
          PAL.cream
        );
        skPoly(
          [
            { x: 10 * s, y: 2 * s },
            { x: 2 * s, y: -6 * s },
            { x: 1 * s, y: 4 * s },
          ],
          PAL.cream
        );
        cuteFace(0, 10 * s, 0.6 * s, 0);
        stroke(...STYLE.inkSoft);
        strokeWeight(1.2);
        for (let i = -1; i <= 1; i++) {
          skLine(-6 * s, (12 + i * 2) * s, -16 * s, (10 + i * 2) * s, 1.6, 0.6);
          skLine(6 * s, (12 + i * 2) * s, 16 * s, (10 + i * 2) * s, 1.6, 0.6);
        }
      }

      function drawBunny({ s, hovered }) {
        skEllipse(0, 8 * s, 16 * s, 12 * s, PAL.cream, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(-6 * s, -4 * s, 5 * s, 14 * s, PAL.cream, STYLE.ink, 2.0);
        skEllipse(6 * s, -4 * s, 5 * s, 14 * s, PAL.cream, STYLE.ink, 2.0);
        skEllipse(-6 * s, -3 * s, 2.2 * s, 10 * s, PAL.blush, null, 0);
        skEllipse(6 * s, -3 * s, 2.2 * s, 10 * s, PAL.blush, null, 0);
        cuteFace(0, 11 * s, 0.55 * s, 1);
        skPoly(
          [
            { x: 14 * s, y: 16 * s },
            { x: 20 * s, y: 12 * s },
            { x: 22 * s, y: 16 * s },
            { x: 16 * s, y: 20 * s },
          ],
          PAL.caramel
        );
        skLine(16 * s, 20 * s, 18 * s, 26 * s, 2.0, 0.8);
        skLine(20 * s, 20 * s, 22 * s, 26 * s, 2.0, 0.8);
      }

      function drawDuckling({ s, hovered }) {
        skEllipse(0, 8 * s, 18 * s, 12 * s, PAL.honey, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(-7 * s, 2 * s, 10 * s, 8 * s, PAL.honey, STYLE.ink, 2.0);
        cuteFace(0, 10 * s, 0.55 * s, 1);
        skPoly(
          [
            { x: -6 * s, y: 14 * s },
            { x: 6 * s, y: 14 * s },
            { x: 0 * s, y: 18 * s },
          ],
          [245, 150, 80]
        );
        skLine(-6 * s, 18 * s, -12 * s, 24 * s, 2.0, 0.8);
        skLine(6 * s, 18 * s, 12 * s, 24 * s, 2.0, 0.8);
      }

      function drawHedgehog({ s, hovered }) {
        skEllipse(0, 10 * s, 18 * s, 12 * s, PAL.cocoa, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(0, 12 * s, 12 * s, 9 * s, PAL.cream, STYLE.ink, 2.0);
        cuteFace(0, 13 * s, 0.55 * s, 1);
        for (let i = 0; i < 10; i++) {
          const a = map(i, 0, 9, -PI * 0.9, -PI * 0.1);
          skLine(cos(a) * 10 * s, 6 * s + sin(a) * 6 * s, cos(a) * 15 * s, 2 * s + sin(a) * 10 * s, 1.8, 0.6);
        }
      }

      function drawBear({ s, hovered }) {
        skEllipse(0, 8 * s, 18 * s, 14 * s, PAL.cocoa, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(-10 * s, 0 * s, 5 * s, 5 * s, PAL.cocoa, STYLE.ink, 2.0);
        skEllipse(10 * s, 0 * s, 5 * s, 5 * s, PAL.cocoa, STYLE.ink, 2.0);
        skEllipse(0, 12 * s, 9 * s, 7 * s, PAL.caramel, STYLE.ink, 2.0);
        cuteFace(0, 12.5 * s, 0.55 * s, 1);
        skPoly(
          [
            { x: -7 * s, y: 18 * s },
            { x: 7 * s, y: 18 * s },
            { x: 5 * s, y: 26 * s },
            { x: -5 * s, y: 26 * s },
          ],
          PAL.blue
        );
      }

      function drawFox({ s, hovered }) {
        skEllipse(0, 8 * s, 18 * s, 14 * s, PAL.red, STYLE.ink, hovered ? 2.8 : 2.2);
        skPoly(
          [
            { x: -10 * s, y: 4 * s },
            { x: -2 * s, y: -6 * s },
            { x: -1 * s, y: 5 * s },
          ],
          PAL.red
        );
        skPoly(
          [
            { x: 10 * s, y: 4 * s },
            { x: 2 * s, y: -6 * s },
            { x: 1 * s, y: 5 * s },
          ],
          PAL.red
        );
        skEllipse(0, 12 * s, 12 * s, 9 * s, PAL.cream, STYLE.ink, 2.0);
        cuteFace(0, 13 * s, 0.55 * s, 1);
        skEllipse(18 * s, 16 * s, 12 * s, 8 * s, PAL.red, STYLE.ink, 2.0);
        skEllipse(22 * s, 16 * s, 6 * s, 5 * s, PAL.cream, STYLE.ink, 1.6);
      }

      function drawPenguin({ s, hovered }) {
        skEllipse(0, 10 * s, 16 * s, 18 * s, [60, 70, 90], STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(0, 14 * s, 11 * s, 13 * s, PAL.cream, STYLE.ink, 2.0);
        cuteFace(0, 10.5 * s, 0.55 * s, 1);
        skPoly(
          [
            { x: -3 * s, y: 13 * s },
            { x: 3 * s, y: 13 * s },
            { x: 0 * s, y: 16 * s },
          ],
          [245, 150, 80]
        );
        skPoly(
          [
            { x: -14 * s, y: 10 * s },
            { x: -6 * s, y: 12 * s },
            { x: -12 * s, y: 18 * s },
          ],
          PAL.blue
        );
        skPoly(
          [
            { x: 14 * s, y: 10 * s },
            { x: 6 * s, y: 12 * s },
            { x: 12 * s, y: 18 * s },
          ],
          PAL.blue
        );
      }

      function drawBird({ s, hovered }) {
        skEllipse(0, 10 * s, 16 * s, 12 * s, PAL.sky, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(-4 * s, 8 * s, 10 * s, 8 * s, PAL.blue, STYLE.ink, 2.0);
        cuteFace(0, 10 * s, 0.55 * s, 1);
        skPoly(
          [
            { x: 6 * s, y: 12 * s },
            { x: 14 * s, y: 10 * s },
            { x: 6 * s, y: 16 * s },
          ],
          [245, 150, 80]
        );
        skLine(-4 * s, 16 * s, -8 * s, 22 * s, 1.8, 0.7);
        skLine(2 * s, 16 * s, -2 * s, 22 * s, 1.8, 0.7);
      }

      function drawSnail({ s, hovered }) {
        skEllipse(-4 * s, 16 * s, 18 * s, 7 * s, PAL.mint, STYLE.ink, hovered ? 2.8 : 2.2);
        skEllipse(6 * s, 10 * s, 11 * s, 11 * s, PAL.caramel, STYLE.ink, 2.0);
        stroke(...STYLE.inkSoft);
        strokeWeight(2);
        noFill();
        arc(6 * s, 10 * s, 10 * s, 10 * s, 0, TWO_PI);
        arc(6 * s, 10 * s, 6 * s, 6 * s, 0, TWO_PI);
        skLine(-12 * s, 12 * s, -14 * s, 6 * s, 1.6, 0.6);
        skLine(-6 * s, 12 * s, -4 * s, 6 * s, 1.6, 0.6);
        noStroke();
        fill(40, 30, 25, 230);
        ellipse(-14 * s, 6 * s, 2.2 * s, 2.2 * s);
        ellipse(-4 * s, 6 * s, 2.2 * s, 2.2 * s);
      }

      function drawCaterpillar({ s, hovered }) {
        const col = PAL.leaf;
        for (let i = 0; i < 5; i++) skEllipse((-10 + i * 5) * s, 14 * s, 7 * s, 6 * s, col, STYLE.ink, hovered ? 2.6 : 2.0);
        skEllipse(-12 * s, 12 * s, 8 * s, 8 * s, lerpArr(col, PAL.mint, 0.3), STYLE.ink, 2.0);
        cuteFace(-12 * s, 12 * s, 0.45 * s, 1);
        skLine(-16 * s, 6 * s, -18 * s, 2 * s, 1.4, 0.5);
        skLine(-8 * s, 6 * s, -6 * s, 2 * s, 1.4, 0.5);
      }

      function drawPottedPlant({ s, hovered }) {
        skPoly(
          [
            { x: -12 * s, y: 18 * s },
            { x: 12 * s, y: 18 * s },
            { x: 9 * s, y: 30 * s },
            { x: -9 * s, y: 30 * s },
          ],
          PAL.cocoa,
          STYLE.ink,
          hovered ? 2.8 : 2.2
        );
        skPoly(
          [
            { x: -8 * s, y: 10 * s },
            { x: -2 * s, y: 0 * s },
            { x: 2 * s, y: 10 * s },
            { x: 0 * s, y: 18 * s },
          ],
          PAL.leaf
        );
        skPoly(
          [
            { x: 2 * s, y: 10 * s },
            { x: 8 * s, y: 0 * s },
            { x: 12 * s, y: 10 * s },
            { x: 4 * s, y: 18 * s },
          ],
          lerpArr(PAL.leaf, PAL.mint, 0.25)
        );
        cuteFace(0, 24 * s, 0.4 * s, 1);
      }

      function drawMushroomHut({ s, hovered }) {
        skEllipse(0, 10 * s, 20 * s, 12 * s, PAL.red, STYLE.ink, hovered ? 2.8 : 2.2);
        for (let i = 0; i < 4; i++) skEllipse((-10 + i * 7) * s, (8 + (i % 2) * 2) * s, 3.5 * s, 3.2 * s, PAL.cream, null, 0);
        skPoly(
          [
            { x: -8 * s, y: 12 * s },
            { x: 8 * s, y: 12 * s },
            { x: 10 * s, y: 28 * s },
            { x: -10 * s, y: 28 * s },
          ],
          PAL.cream,
          STYLE.ink,
          2.0
        );
        skPoly(
          [
            { x: -4 * s, y: 18 * s },
            { x: 4 * s, y: 18 * s },
            { x: 4 * s, y: 28 * s },
            { x: -4 * s, y: 28 * s },
          ],
          PAL.cocoa,
          STYLE.ink,
          1.8
        );
      }

      function drawGiftBox({ s, hovered }) {
        skPoly(
          [
            { x: -14 * s, y: 12 * s },
            { x: 14 * s, y: 12 * s },
            { x: 14 * s, y: 30 * s },
            { x: -14 * s, y: 30 * s },
          ],
          PAL.sky,
          STYLE.ink,
          hovered ? 2.8 : 2.2
        );
        skPoly(
          [
            { x: -2 * s, y: 12 * s },
            { x: 2 * s, y: 12 * s },
            { x: 2 * s, y: 30 * s },
            { x: -2 * s, y: 30 * s },
          ],
          PAL.pink,
          STYLE.ink,
          1.8
        );
        skPoly(
          [
            { x: -14 * s, y: 20 * s },
            { x: 14 * s, y: 20 * s },
            { x: 14 * s, y: 24 * s },
            { x: -14 * s, y: 24 * s },
          ],
          PAL.pink,
          STYLE.ink,
          1.8
        );
        ribbonBow(0, 10 * s, 1.2 * s, PAL.pink);
      }

      function drawHotAirBalloon({ s, hovered }) {
        skEllipse(0, 6 * s, 16 * s, 20 * s, PAL.pink, STYLE.ink, hovered ? 2.8 : 2.2);
        for (let i = -1; i <= 1; i++) {
          const cx = i * 3.2 * s;
          const hw = 0.9 * s;
          skPoly(
            [
              { x: cx - hw, y: 2 * s },
              { x: cx + hw, y: 2 * s },
              { x: cx + hw, y: 10.5 * s },
              { x: cx - hw, y: 10.5 * s },
            ],
            i === 0 ? PAL.cream : PAL.honey,
            null,
            0
          );
        }
        skLine(-6 * s, 16 * s, -8 * s, 26 * s, 1.6, 0.6);
        skLine(6 * s, 16 * s, 8 * s, 26 * s, 1.6, 0.6);
        skPoly(
          [
            { x: -8 * s, y: 26 * s },
            { x: 8 * s, y: 26 * s },
            { x: 6 * s, y: 34 * s },
            { x: -6 * s, y: 34 * s },
          ],
          PAL.cocoa,
          STYLE.ink,
          2.0
        );
      }

      function drawKite({ s, hovered }) {
        skPoly(
          [
            { x: 0 * s, y: 2 * s },
            { x: 14 * s, y: 14 * s },
            { x: 0 * s, y: 26 * s },
            { x: -14 * s, y: 14 * s },
          ],
          PAL.honey,
          STYLE.ink,
          hovered ? 2.8 : 2.2
        );
        skPoly(
          [
            { x: -3 * s, y: 11 * s },
            { x: 3 * s, y: 11 * s },
            { x: 3 * s, y: 17 * s },
            { x: -3 * s, y: 17 * s },
          ],
          PAL.pink,
          STYLE.ink,
          1.8
        );
        skLine(0, 26 * s, 0, 36 * s, 1.6, 0.7);
        for (let i = 0; i < 3; i++) {
          skPoly(
            [
              { x: 0 * s, y: (32 + i * 6) * s },
              { x: 4 * s, y: (35 + i * 6) * s },
              { x: 0 * s, y: (38 + i * 6) * s },
              { x: -4 * s, y: (35 + i * 6) * s },
            ],
            PAL.sky,
            STYLE.ink,
            1.6
          );
        }
      }

      function drawCocoaMug({ s, hovered }) {
        skPoly(
          [
            { x: -12 * s, y: 12 * s },
            { x: 10 * s, y: 12 * s },
            { x: 10 * s, y: 30 * s },
            { x: -12 * s, y: 30 * s },
          ],
          PAL.cream,
          STYLE.ink,
          hovered ? 2.8 : 2.2
        );
        skEllipse(10 * s, 20 * s, 6 * s, 8 * s, PAL.cream, STYLE.ink, 2.0);
        skEllipse(10 * s, 20 * s, 3 * s, 5 * s, STYLE.bg, STYLE.bg, 0);
        skEllipse(-1 * s, 14 * s, 11 * s, 3.5 * s, PAL.cocoa, STYLE.ink, 1.8);
        // steam
        stroke(...STYLE.inkSoft);
        strokeWeight(1.4);
        noFill();
        for (let i = -1; i <= 1; i++) {
          const x = (i * 4 + random(-0.6, 0.6)) * s;
          beginShape();

      const PAGES = [ASSETS_PAGE_1, ASSETS_PAGE_2, ASSETS_PAGE_3];

      // =========================
      // 网格渲染 + 交互
      // =========================
      const LAYOUT = { assetScale: 0.86, assetLift: -4 };

      let grid = {
        cols: 8,
        rows: 5,
        pad: 18,
        labelH: 34,
        headerH: 78,
        footerH: 26,
      };
      let cells = [];
      let hoverIndex = -1;
      let pageIndex = 0;
      let pageSeeds = PAGES.map(() => []);
      let headerButtons = { prev: null, next: null };

      function pageAssets() {
        return PAGES[pageIndex];
      }

      function clampPage() {
        pageIndex = constrain(pageIndex, 0, PAGES.length - 1);
      }

      function switchPage(delta) {
        pageIndex = constrain(pageIndex + delta, 0, PAGES.length - 1);
        hoverIndex = -1;
        buildGrid();
      }

      function chooseCols() {
        if (windowWidth >= 1100) return 8;
        if (windowWidth >= 860) return 6;
        if (windowWidth >= 640) return 5;
        return 4;
      }

      function buildGrid() {
        grid.cols = chooseCols();
        const assets = pageAssets();
        grid.rows = ceil(assets.length / grid.cols);
        cells = [];
        const seedBank = pageSeeds[pageIndex];
        for (let i = 0; i < assets.length; i++) {
          if (seedBank[i] === undefined) seedBank[i] = floor(random(1e9));
          cells.push({ seed: seedBank[i] });
        }
      }

      function setup() {
        createCanvas(windowWidth, windowHeight);
        pixelDensity(1);
        textFont("system-ui, -apple-system, Segoe UI, Roboto, sans-serif");
        clampPage();
        buildGrid();
      }

      function drawBackground() {
        background(...STYLE.bg);
        // soft vignette
        noStroke();
        for (let i = 6; i >= 1; i--) {
          fill(220, 190, 150, 6 * i);
          ellipse(width * 0.3, height * 0.2, 320 * i, 220 * i);
          fill(170, 210, 235, 5 * i);
          ellipse(width * 0.8, height * 0.2, 320 * i, 220 * i);
        }
      }

      function drawHeader() {
        noStroke();
        fill(255, 255, 255, 160);
        rect(0, 0, width, grid.headerH);
        fill(...STYLE.ink);
        textAlign(LEFT, TOP);
        textSize(18);
        text("温暖可爱资产画册（手绘风）", 16, 14);
        fill(...STYLE.inkSoft);
        textSize(12);
        const hint =
          "Hover 高亮，Click 单格重掷细节；←/→ 翻页\n（第 3 页为新增 40 个资产）";
        text(hint, 16, 40, max(220, width - 260), 999);

        // page indicator + buttons
        const btnH = 30;
        const btnW = 92;
        const y = 12;
        const nextX = width - 16 - btnW;
        const prevX = nextX - 10 - btnW;
        headerButtons.prev = { x: prevX, y, w: btnW, h: btnH };
        headerButtons.next = { x: nextX, y, w: btnW, h: btnH };

        const canPrev = pageIndex > 0;
        const canNext = pageIndex < PAGES.length - 1;

        drawHeaderButton(headerButtons.prev, "上一页", canPrev);
        drawHeaderButton(headerButtons.next, "下一页", canNext);

        fill(...STYLE.inkSoft);
        textAlign(RIGHT, CENTER);
        textSize(12);
        text(`Page ${pageIndex + 1}/${PAGES.length}`, prevX - 10, y + btnH / 2);

        // reset text defaults for cells
        textAlign(CENTER, TOP);
      }

      function drawHeaderButton(r, label, enabled) {
        const hovered = mouseX >= r.x && mouseX <= r.x + r.w && mouseY >= r.y && mouseY <= r.y + r.h;
        noStroke();
        const base = enabled ? [255, 255, 255, 210] : [255, 255, 255, 120];
        const hi = enabled && hovered ? [255, 220, 150, 160] : null;
        fill(...base);
        rect(r.x, r.y, r.w, r.h, 999);
        if (hi) {
          fill(...hi);
          rect(r.x + 2, r.y + 2, r.w - 4, r.h - 4, 999);
        }
        fill(enabled ? STYLE.ink[0] : STYLE.inkSoft[0], enabled ? STYLE.ink[1] : STYLE.inkSoft[1], enabled ? STYLE.ink[2] : STYLE.inkSoft[2], enabled ? 255 : 140);
        textAlign(CENTER, CENTER);
        textSize(12);
        text(label, r.x + r.w / 2, r.y + r.h / 2);
      }

      function cellRect(idx) {
        const contentTop = grid.headerH + grid.pad;
        const contentH = height - grid.headerH - grid.footerH - grid.pad * 2;
        const cw = (width - grid.pad * (grid.cols + 1)) / grid.cols;
        const ch = (contentH - grid.pad * (grid.rows - 1)) / grid.rows;
        const col = idx % grid.cols;
        const row = floor(idx / grid.cols);
        const x = grid.pad + col * (cw + grid.pad);
        const y = contentTop + row * (ch + grid.pad);
        return { x, y, w: cw, h: ch };
      }

      function drawCell(idx) {
        const assets = pageAssets();
        const asset = assets[idx];
        const r = cellRect(idx);
        const hovered = idx === hoverIndex;
        const rounding = 16;

        // card
        noStroke();
        fill(...STYLE.card);
        rect(r.x, r.y, r.w, r.h, rounding);
        if (hovered) {
          noFill();
          stroke(255, 210, 140, 220);
          strokeWeight(3);
          rect(r.x + 1.5, r.y + 1.5, r.w - 3, r.h - 3, rounding);
          noStroke();
          fill(255, 220, 150, 60);
          rect(r.x + 6, r.y + 6, r.w - 12, r.h - 12, rounding - 6);
        }

        // asset area
        const labelH = grid.labelH;
        const ax = r.x + r.w / 2;
        const ay = r.y + (r.h - labelH) / 2 - 4;
        const maxSize = min(r.w, r.h - labelH) * 0.78;

        push();
        translate(ax, ay);
        translate(0, LAYOUT.assetLift);
        const s = (maxSize / 80) * LAYOUT.assetScale; // canonical box ~80px
        randomSeed(cells[idx].seed);
        noiseSeed(cells[idx].seed);
        // subtle wobble to keep life without re-randomizing
        translate(0, sin(frameCount * 0.02 + idx) * 0.45);
        asset.draw({ s, hovered });
        pop();

        // labels
        const lx = r.x + r.w / 2;
        const ly = r.y + r.h - labelH + 4;
        textAlign(CENTER, TOP);
        fill(...STYLE.ink);
        textSize(12);
        text(asset.nameCN, lx, ly);
        fill(...STYLE.inkSoft);
        textSize(10.5);
        text(asset.nameEN, lx, ly + 14);
      }

      function draw() {
        drawBackground();
        drawHeader();

        hoverIndex = hitTest(mouseX, mouseY);
        const assets = pageAssets();
        for (let i = 0; i < assets.length; i++) drawCell(i);

        // footer
        fill(0, 0, 0, 0);
      }

      function hitTest(mx, my) {
        if (my < grid.headerH) return -1;
        const assets = pageAssets();
        for (let i = 0; i < assets.length; i++) {
          const r = cellRect(i);
          if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) return i;
        }
        return -1;
      }

      function mousePressed() {
        // header buttons first
        if (headerButtons.prev) {
          const r = headerButtons.prev;
          const hit = mouseX >= r.x && mouseX <= r.x + r.w && mouseY >= r.y && mouseY <= r.y + r.h;
          if (hit && pageIndex > 0) return switchPage(-1);
        }
        if (headerButtons.next) {
          const r = headerButtons.next;
          const hit = mouseX >= r.x && mouseX <= r.x + r.w && mouseY >= r.y && mouseY <= r.y + r.h;
          if (hit && pageIndex < PAGES.length - 1) return switchPage(1);
        }

        const idx = hitTest(mouseX, mouseY);
        if (idx >= 0) {
          const newSeed = floor(random(1e9));
          cells[idx].seed = newSeed;
          pageSeeds[pageIndex][idx] = newSeed;
        }
      }

      function keyPressed() {
        if (keyCode === RIGHT_ARROW) switchPage(1);
        if (keyCode === LEFT_ARROW) switchPage(-1);
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        buildGrid();
      }
    </script>
