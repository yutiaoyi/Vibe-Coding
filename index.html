<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Interactive Ocean Tide - Code Art</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f0e9; /* 沙滩米白色 */
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        .ui-text {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            color: #333;
            font-family: 'Courier New', monospace;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="ui-text">
        I was then in a sort of temper indolent and struck with awe...<br>
        一种慵懒而惊惧的心境，如潮汐般反复。
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/[]{}";
        let tideOffset = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            textFont('monospace');
            textSize(11);
            
            // 【密度与范围重塑】：间距 16 保持密集感
            let spacing = 16; 
            // 垂直范围从 -height 延伸到 height * 2.5，确保涨潮时底部不空
            for (let x = -20; x < width + 20; x += spacing) {
                for (let y = -height; y < height * 2.5; y += spacing) {
                    let offX = random(-7, 7);
                    let offY = random(-7, 7);
                    particles.push(new Particle(x + offX, y + offY));
                }
            }
        }

        function draw() {
            // 1. 底层：沙滩纹理
            drawBeach();

            // 2. 计算潮汐波动
            let waveCycle = sin(frameCount * 0.01); 
            // 涨潮高度映射：保持满屏覆盖能力
            tideOffset = map(waveCycle, -1, 1, height * 0.15, -height * 0.65); 

            // 3. 绘制深海基底
            drawOceanBase();

            // 4. 更新并绘制粒子 (带性能剪裁)
            for (let p of particles) {
                // 只有在屏幕范围内或即将进入屏幕的粒子才进行逻辑计算
                // currentY 是预估位置，用来做性能剪裁
                let estY = p.originY + tideOffset;
                if (estY > -50 && estY < height + 50) {
                    p.update();
                    p.display();
                }
            }
        }

        function drawBeach() {
            background(242, 240, 233); 
            noStroke();
            fill(200, 190, 170, 30);
            for(let i=0; i<150; i++) {
                rect(random(width), random(height), 2, 2);
            }
        }

        function drawOceanBase() {
            fill(10, 45, 90, 150); 
            noStroke();
            beginShape();
            vertex(0, height);
            for (let x = 0; x <= width; x += 20) {
                let n = noise(x * 0.005, frameCount * 0.01);
                let waveEdge = height * 0.45 + n * 120 + tideOffset; 
                vertex(x, waveEdge);
            }
            vertex(width, height);
            endShape(CLOSE);
        }

        class Particle {
            constructor(x, y) {
                this.originX = x;
                this.originY = y;
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.char = chars.charAt(floor(random(chars.length)));
                this.baseAlpha = random(100, 230);
            }

            update() {
                let n = noise(this.originX * 0.005, this.originY * 0.005, frameCount * 0.01);
                let currentTideY = this.originY + tideOffset + n * 30;

                let mouse = createVector(mouseX, mouseY);
                if (p5.Vector.dist(this.pos, mouse) < 100) {
                    let repulsion = p5.Vector.sub(this.pos, mouse);
                    repulsion.normalize();
                    repulsion.mult(6);
                    this.vel.add(repulsion);
                }

                let target = createVector(this.originX, currentTideY);
                let spring = p5.Vector.sub(target, this.pos);
                spring.mult(0.05);
                this.vel.add(spring);

                this.pos.add(this.vel);
                this.vel.mult(0.9);
            }

            display() {
                let n = noise(this.pos.x * 0.005, frameCount * 0.01);
                let waveEdge = height * 0.45 + n * 120 + tideOffset;

                // 只有处于波浪线以下的粒子才绘制
                if (this.pos.y > waveEdge - 15) {
                    fill(10, 30, 80, this.baseAlpha);
                    noStroke();
                    text(this.char, this.pos.x, this.pos.y);
                    
                    // 连线逻辑
                    if (random(1) > 0.985) {
                        stroke(20, 50, 100, 25);
                        strokeWeight(0.5);
                        line(this.pos.x, this.pos.y, this.pos.x + 15, this.pos.y + 15);
                    }
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            particles = [];
            setup();
        }
    </script>
</body>
</html>
