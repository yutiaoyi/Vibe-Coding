<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Interactive Ocean Tide - Deca Joins Narrative</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f0e9; /* 沙滩米白色 */
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/[]{}";
        let tideOffset = 0;
        let tideSpeed = 0.01; 

        // 5段歌词内容
        const lyrics = [
            { zh: "盼着望着\n但明天太远了", en: "Gazing and longing,\nBut tomorrow is too far away." },
            { zh: "这就是我的生活\n太阳在坠落\n海浪在发愁\n不停地退后", en: "This is my life. The sun is falling,\nThe waves are grieving, retreating endlessly." },
            { zh: "终于忘记你的时候\n你出现在我的梦里", en: "When I finally forget you,\nYou appear in my dreams." },
            { zh: "人与蝉 蝉与狗 狗与深夜冲撞高处街灯的蛾\n所有浮生里万千的脸孔\n让我因为你们隆重", en: "Humans & cicadas, dogs & moths hitting streetlights,\nTen thousand faces in all floating lives,\nMake me solemn because of you." },
            { zh: "人们火热 城市，何必寂寞\n我多爱你 但不因你而什么\n时光穿梭 我们不在左右只在彼此其中", en: "People are fervent, the city—why be lonely?\nI love you so much, but not because of anything,\nTime shuttles; we are within each other." }
        ];
        
        let lyricIndex = 0;
        let hasSwitched = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            textFont('Courier New', 'monospace');
            
            let spacing = 16; 
            for (let x = -20; x < width + 20; x += spacing) {
                for (let y = -height; y < height * 2.5; y += spacing) {
                    let offX = random(-7, 7);
                    let offY = random(-7, 7);
                    particles.push(new Particle(x + offX, y + offY));
                }
            }
        }

        function draw() {
            // 1. 底层沙滩
            drawBeach();

            // 2. 潮汐波动计算
            let waveCycle = sin(frameCount * tideSpeed); 
            tideOffset = map(waveCycle, -1, 1, height * 0.15, -height * 0.65); 

            // 涨潮至完全覆盖时切换歌词
            if (waveCycle > 0.95 && !hasSwitched) {
                lyricIndex = (lyricIndex + 1) % lyrics.length;
                hasSwitched = true;
            }
            if (waveCycle < 0) hasSwitched = false;

            // 3. 【底层图层】绘制歌词
            drawLyrics();

            // 4. 【中间图层】绘制不透明海浪基底
            drawOceanBase();

            // 5. 【顶层图层】更新并绘制乱码字符
            for (let p of particles) {
                let estY = p.originY + tideOffset;
                if (estY > -50 && estY < height + 50) {
                    p.update();
                    p.display();
                }
            }
        }

        function drawBeach() {
            background(242, 240, 233); 
            noStroke();
            fill(200, 190, 170, 30);
            for(let i=0; i<150; i++) {
                rect(random(width), random(height), 2, 2);
            }
        }

        function drawLyrics() {
            textAlign(CENTER, TOP);
            let baseY = height * 0.1;
            
            // 英文部分
            fill(120, 120, 120, 180);
            textSize(14);
            text(lyrics[lyricIndex].en, width/2, baseY);
            
            // 中文部分
            fill(51, 51, 51, 200);
            textSize(14);
            let enLines = lyrics[lyricIndex].en.split('\n').length;
            text(lyrics[lyricIndex].zh, width/2, baseY + enLines * 20 + 10);
        }

        function drawOceanBase() {
            fill('#6b7e96'); // 使用不透明色码，确保完全遮挡歌词
            noStroke();
            beginShape();
            vertex(0, height);
            for (let x = 0; x <= width; x += 20) {
                let n = noise(x * 0.005, frameCount * tideSpeed);
                let waveEdge = height * 0.45 + n * 120 + tideOffset; 
                vertex(x, waveEdge);
            }
            vertex(width, height);
            endShape(CLOSE);
        }

        class Particle {
            constructor(x, y) {
                this.originX = x;
                this.originY = y;
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.char = chars.charAt(floor(random(chars.length)));
                // 【深浅设置】：随机 Alpha 范围扩大，产生更明显的深浅感
                this.baseAlpha = random(50, 255);
            }

            update() {
                let n = noise(this.originX * 0.005, this.originY * 0.005, frameCount * tideSpeed);
                let currentTideY = this.originY + tideOffset + n * 30;

                let mouse = createVector(mouseX, mouseY);
                if (p5.Vector.dist(this.pos, mouse) < 100) {
                    let repulsion = p5.Vector.sub(this.pos, mouse);
                    repulsion.normalize();
                    repulsion.mult(6);
                    this.vel.add(repulsion);
                }

                let target = createVector(this.originX, currentTideY);
                let spring = p5.Vector.sub(target, this.pos);
                spring.mult(0.05);
                this.vel.add(spring);

                this.pos.add(this.vel);
                this.vel.mult(0.9);
            }

            display() {
                let n = noise(this.pos.x * 0.005, frameCount * tideSpeed);
                let waveEdge = height * 0.45 + n * 120 + tideOffset;

                if (this.pos.y > waveEdge - 15) {
                    // 设置随机深浅颜色
                    fill(10, 30, 80, this.baseAlpha);
                    textSize(11);
                    noStroke();
                    text(this.char, this.pos.x, this.pos.y);
                    
                    // 【粗细设置】：如果 Alpha 较高（较亮的字符），重复绘制一次并轻微偏移，模拟加粗效果
                    if (this.baseAlpha > 180) {
                        text(this.char, this.pos.x + 0.5, this.pos.y);
                    }
                    
                    // 偶尔生成的连线
                    if (random(1) > 0.985) {
                        stroke(20, 50, 100, 25);
                        strokeWeight(0.5);
                        line(this.pos.x, this.pos.y, this.pos.x + 15, this.pos.y + 15);
                    }
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            particles = [];
            setup();
        }
    </script>
</body>
</html>
