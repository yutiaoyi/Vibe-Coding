<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>达利风格融化时钟交互</title>
    <style>
        :root {
            --bg-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ccc; /* 模拟背景 */
            overflow: hidden;
            font-family: serif;
        }

        /* 背景模糊效果 */
        .background-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80&w=2072') no-repeat center center/cover;
            filter: blur(20px) brightness(0.8);
            z-index: -1;
        }

        .clock-container {
            position: relative;
            width: 500px;
            height: 600px;
            cursor: pointer;
            /* 应用我们定义的SVG滤镜 */
            filter: url(#gooey) drop-shadow(20px 20px 30px rgba(0,0,0,0.5));
        }

        /* 时钟外壳：金属质感边框 */
        .clock-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            /* 使用 clip-path 创建类似达利时钟的不规则形状 */
            clip-path: polygon(30% 0%, 70% 5%, 95% 30%, 90% 70%, 70% 95%, 20% 90%, 5% 60%, 10% 20%);
            border: 8px solid #ddd;
            box-sizing: border-box;
            overflow: hidden;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/24/Salvador_Dal%C3%AD_1939.jpg') no-repeat center center;
            background-size: cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* 模拟金属边框的光泽 */
        .clock-frame::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 15px solid rgba(255,255,255,0.4);
            border-radius: inherit;
            pointer-events: none;
        }

        /* 数字层 */
        .numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            color: white;
            font-size: 2rem;
            pointer-events: none;
        }

        .num { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .n12 { top: 10%; left: 50%; transform: translateX(-50%); }
        .n3 { top: 50%; right: 15%; transform: translateY(-50%); }
        .n6 { bottom: 10%; left: 50%; transform: translateX(-50%); }
        .n9 { top: 50%; left: 15%; transform: translateY(-50%); }

    </style>
</head>
<body>

    <div class="background-blur"></div>

    <div class="clock-container" id="clock">
        <div class="clock-frame">
            <!-- 可以在这里添加时钟指针 -->
        </div>
        <div class="numbers">
            <span class="num n12">12</span>
            <span class="num n3">3</span>
            <span class="num n6">6</span>
            <span class="num n9">9</span>
        </div>
    </div>

    <!-- SVG 滤镜定义 -->
    <svg style="display: none;">
        <defs>
            <filter id="gooey">
                <!-- 生成动态噪点 -->
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="5" seed="1" result="noise" />
                <!-- 基于噪点图对原图进行位移扭曲 -->
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G" id="displacement" />
            </filter>
        </defs>
    </svg>

    <script>
        const clock = document.getElementById('clock');
        const displacement = document.getElementById('displacement');
        
        // 交互逻辑：根据鼠标位置改变扭曲程度和噪点频率
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            // 改变 scale (扭曲强度)
            const scale = 30 + (x * 70); 
            displacement.setAttribute('scale', scale);
            
            // 动态改变频率，产生“流动”感
            const filter = document.querySelector('feTurbulence');
            const freq = 0.01 + (y * 0.02);
            filter.setAttribute('baseFrequency', freq);
        });

        // 增加点击时的剧烈晃动感
        clock.addEventListener('mousedown', () => {
            displacement.setAttribute('scale', '150');
        });
        clock.addEventListener('mouseup', () => {
            displacement.setAttribute('scale', '50');
        });
    </script>
</body>
</html>
