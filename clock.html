<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>达利之镜 - 玻璃复古版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <style>
        :root {
            --glass-rim: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #0a0a0a;
            overflow: hidden; font-family: 'Times New Roman', serif;
        }

        #status {
            position: fixed; top: 20px; left: 20px;
            color: rgba(255,255,255,0.4); font-size: 12px; z-index: 1000;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* 背景模糊视频 - 增加颗粒感调色 */
        #bg-video-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(25px) grayscale(1) brightness(0.3);
            z-index: -2;
            transform: scaleX(-1);
        }

        /* 噪点覆盖层 - 模拟复古颗粒 */
        #noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500;
            pointer-events: none;
            opacity: 0.15;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 胶片闪烁感动画 */
        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        #mirror-system {
            position: relative;
            width: 700px; height: 700px;
            transition: transform 0.1s ease-out;
            display: flex; justify-content: center; align-items: center;
            animation: flicker 0.1s infinite; /* 模拟老胶片闪烁 */
        }

        /* 核心图层容器 - 关键在于 drop-shadow 产生的厚度感 */
        .ring-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.3s ease;
            
            /* 模拟玻璃边缘：第一个滤镜是亮边，第二个是厚度阴影 */
            filter: 
                drop-shadow(1px 1px 1px var(--glass-rim)) 
                drop-shadow(8px 8px 15px var(--glass-shadow));
        }

        /* 视频本身 - 黑白滤镜 */
        .camera-video {
            position: absolute;
            width: 1100px; height: 1100px;
            object-fit: cover;
            transform-origin: center center;
            /* 黑白调色：黑白、高对比、轻微反光感 */
            filter: grayscale(1) contrast(1.3) brightness(0.8);
        }

        .glass-sheen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 模拟玻璃表面的划痕和反光 */
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%),
                linear-gradient(45deg, rgba(255,255,255,0) 45%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 55%);
            z-index: 200; pointer-events: none; mix-blend-mode: screen;
        }

        .numbers-overlay {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 300; pointer-events: none;
            filter: grayscale(1);
        }

        .num {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 4.5rem; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .n12 { top: 5%; left: 50%; transform: translateX(-50%) scaleY(1.3); }
        .n3  { right: 5%; top: 50%; transform: translateY(-50%) scaleX(1.3); }
        .n6  { bottom: 5%; left: 50%; transform: translateX(-50%) scaleY(1.3); }
        .n9  { left: 5%; top: 50%; transform: translateY(-50%) scaleX(1.3); }

        /* 暗角效果 */
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.7) 100%);
            z-index: 400;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">INITIATING TEMPORAL MIRROR...</div>
    <div id="noise-overlay"></div>
    <div id="vignette"></div>

    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <video id="bg-video-blur" autoplay muted playsinline></video>

    <div id="mirror-system">
        <div class="glass-sheen" id="sheen"></div>
        <div class="numbers-overlay">
            <div class="num n12">12</div>
            <div class="num n3">3</div>
            <div class="num n6">6</div>
            <div class="num n9">9</div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const system = document.getElementById('mirror-system');
        const bgVideoBlur = document.getElementById('bg-video-blur');
        const webcamElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        
        const MAX_LAYERS = 25; 
        const MIN_LAYERS = 4;  
        const baseAngleStep = 35; 
        const videoElements = [];
        const layerContainers = [];
        const SHAPE_SEED = 1.5;

        let targetMultiplier = 1;      
        let currentMultiplier = 1;     
        let targetDepth = 0;           
        let currentDepth = 0;
        let handLandmarker = undefined;

        async function initHandDetection() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            statusElement.innerText = "MIRROR READY - EXTEND HAND";
            initCamera();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                webcamElement.srcObject = stream;
                bgVideoBlur.srcObject = stream;
                videoElements.forEach(video => video.srcObject = stream);
                webcamElement.addEventListener("loadeddata", predictWebcam);
                requestAnimationFrame(updateAnimation);
            } catch (err) {
                statusElement.innerText = "CAMERA ACCESS DENIED";
            }
        }

        async function predictWebcam() {
            let startTimeMs = performance.now();
            if (handLandmarker) {
                const results = handLandmarker.detectForVideo(webcamElement, startTimeMs);
                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    
                    let foldedFingers = 0;
                    const fingerTips = [8, 12, 16, 20];
                    const fingerBases = [5, 9, 13, 17];
                    for (let i = 0; i < 4; i++) {
                        if (landmarks[fingerTips[i]].y > landmarks[fingerBases[i]].y) foldedFingers++;
                    }
                    targetMultiplier = (foldedFingers >= 3) ? 0 : 1;

                    const dx = landmarks[5].x - landmarks[17].x;
                    const dy = landmarks[5].y - landmarks[17].y;
                    const handSize = Math.sqrt(dx*dx + dy*dy);
                    let depth = (handSize - 0.08) / 0.22; 
                    targetDepth = Math.min(Math.max(depth, 0), 1);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function generateSmoothPath(radius) {
            if (radius <= 0) return 'none';
            const points = [];
            const segments = 50; 
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const distortionFactor = Math.sin(angle * 3 + SHAPE_SEED) * 0.1 + 
                                         Math.cos(angle * 2) * 0.05;
                const r = radius * (1 + distortionFactor);
                const x = 50 + Math.cos(angle) * r;
                const y = 50 + Math.sin(angle) * r;
                points.push(`${x.toFixed(1)}% ${y.toFixed(1)}%`);
            }
            return `polygon(${points.join(', ')})`;
        }

        function updateAnimation() {
            currentMultiplier += (targetMultiplier - currentMultiplier) * 0.08;
            currentDepth += (targetDepth - currentDepth) * 0.05;

            const dynamicLayerCount = MIN_LAYERS + (currentDepth * (MAX_LAYERS - MIN_LAYERS));

            videoElements.forEach((video, i) => {
                const layer = layerContainers[i];
                
                if (i < dynamicLayerCount) {
                    const dynamicRadius = 50 * (1 - i / dynamicLayerCount);
                    layer.style.opacity = "1";
                    layer.style.clipPath = generateSmoothPath(dynamicRadius);
                    
                    // 物理偏移感：越往深处层级，轻微偏移产生折射感
                    const parallax = i * 1.5 * currentDepth;
                    const fixedRotation = i * baseAngleStep * currentMultiplier;
                    
                    video.style.transform = `scaleX(-1) translate(${parallax}px, ${parallax}px) rotate(${fixedRotation}deg)`;
                    
                    // 深度调色：越往里层，对比度越高，颜色越深，模拟光线在玻璃中的损耗
                    video.style.filter = `grayscale(1) contrast(${1.2 + i * 0.05}) brightness(${0.9 - i * 0.02})`;
                } else {
                    layer.style.opacity = "0";
                }
            });

            requestAnimationFrame(updateAnimation);
        }

        // --- 初始图层创建 ---
        for (let i = 0; i < MAX_LAYERS; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'glass-layer-wrap';
            wrap.style.position = 'absolute';
            wrap.style.width = '100%';
            wrap.style.height = '100%';
            wrap.style.zIndex = i;
            
            const layer = document.createElement('div');
            layer.className = 'ring-layer';
            
            const video = document.createElement('video');
            video.className = 'camera-video';
            video.autoplay = true; video.muted = true; video.playsinline = true;
            
            videoElements.push(video);
            layerContainers.push(layer);
            
            layer.appendChild(video);
            wrap.appendChild(layer);
            system.insertBefore(wrap, system.firstChild);
        }

        // 鼠标交互：增强透视控制
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            // 增加 perspective 强化玻璃侧视感
            system.style.transform = `perspective(1200px) rotateX(${y * 20}deg) rotateY(${-x * 20}deg) rotateZ(${x * 10}deg)`;
            document.getElementById('sheen').style.transform = `translate(${x*40}px, ${y*40}px)`;
        });

        initHandDetection();
    </script>
</body>
</html>
