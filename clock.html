<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>达利之镜 - 手势交互版</title>
    <!-- 引入 MediaPipe 相关库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #000;
            overflow: hidden; font-family: 'Times New Roman', serif;
        }

        /* 状态提示 */
        #status {
            position: fixed; top: 20px; left: 20px;
            color: rgba(255,255,255,0.5); font-size: 14px; z-index: 1000;
        }

        #bg-video-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(15px) brightness(0.4);
            z-index: -1;
            transform: scaleX(-1);
        }

        #mirror-system {
            position: relative;
            width: 700px; height: 700px;
            transition: transform 0.1s ease-out;
            display: flex; justify-content: center; align-items: center;
        }

        .ring-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        .camera-video {
            position: absolute;
            width: 1100px; height: 1100px;
            object-fit: cover;
            transform-origin: center center;
        }

        .glass-sheen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            z-index: 200; pointer-events: none; mix-blend-mode: screen;
        }

        .numbers-overlay {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 300; pointer-events: none;
        }

        .num {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            font-size: 4.5rem; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .n12 { top: 5%; left: 50%; transform: translateX(-50%) scaleY(1.3); }
        .n3  { right: 5%; top: 50%; transform: translateY(-50%) scaleX(1.3); }
        .n6  { bottom: 5%; left: 50%; transform: translateX(-50%) scaleY(1.3); }
        .n9  { left: 5%; top: 50%; transform: translateY(-50%) scaleX(1.3); }
    </style>
</head>
<body>

    <div id="status">正在加载 AI 模型...</div>
    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <video id="bg-video-blur" autoplay muted playsinline></video>

    <div id="mirror-system">
        <div class="glass-sheen" id="sheen"></div>
        <div class="numbers-overlay">
            <div class="num n12">12</div>
            <div class="num n3">3</div>
            <div class="num n6">6</div>
            <div class="num n9">9</div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const system = document.getElementById('mirror-system');
        const bgVideoBlur = document.getElementById('bg-video-blur');
        const webcamElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        
        const layerCount = 6;
        const baseAngleStep = 35; // 基础旋转偏移
        const videoElements = [];
        const SHAPE_SEED = 1.5;

        // 交互算法变量
        let targetMultiplier = 1;      // 目标偏转倍率 (1=张手, 0=握拳)
        let currentMultiplier = 1;     // 当前偏转倍率 (用于平滑动画)
        let handLandmarker = undefined;

        // 1. 初始化手势识别
        async function initHandDetection() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            statusElement.innerText = "模型加载成功，请展示手掌";
            initCamera();
        }

        // 2. 初始化摄像头
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 } 
                });
                webcamElement.srcObject = stream;
                bgVideoBlur.srcObject = stream;
                videoElements.forEach(video => video.srcObject = stream);
                
                webcamElement.addEventListener("loadeddata", predictWebcam);
                requestAnimationFrame(updateAnimation);
            } catch (err) {
                statusElement.innerText = "摄像头开启失败";
            }
        }

        // 3. 实时预测手势
        async function predictWebcam() {
            let startTimeMs = performance.now();
            const results = handLandmarker.detectForVideo(webcamElement, startTimeMs);

            if (results.landmarks && results.landmarks.length > 0) {
                const landmarks = results.landmarks[0];
                
                // 简单的“握拳”判定算法：
                // 判断 8, 12, 16, 20 (指尖) 的 Y 坐标是否大于它们的指根 5, 9, 13, 17
                // 在屏幕坐标中，Y 越大表示越靠下（手指弯曲）
                let foldedFingers = 0;
                const fingerTips = [8, 12, 16, 20];
                const fingerBases = [5, 9, 13, 17];

                for (let i = 0; i < 4; i++) {
                    if (landmarks[fingerTips[i]].y > landmarks[fingerBases[i]].y) {
                        foldedFingers++;
                    }
                }

                if (foldedFingers >= 3) {
                    targetMultiplier = 0; // 握拳：消除偏转
                    statusElement.innerText = "手势：握拳 (恢复现实)";
                } else {
                    targetMultiplier = 1; // 张手：增加偏转
                    statusElement.innerText = "手势：张手 (抽象折射)";
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        // 4. 平滑动画更新循环
        function updateAnimation() {
            // 插值算法，让 currentMultiplier 平滑靠近 targetMultiplier
            // 0.05 决定了“变化”的速度
            currentMultiplier += (targetMultiplier - currentMultiplier) * 0.08;

            videoElements.forEach((video, i) => {
                const fixedRotation = i * baseAngleStep * currentMultiplier;
                video.style.transform = `scaleX(-1) rotate(${fixedRotation}deg)`;
            });

            requestAnimationFrame(updateAnimation);
        }

        // --- 以下保留原有形状和交互逻辑 ---

        function generateSmoothPath(radius) {
            const points = [];
            const segments = 150;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const distortionFactor = Math.sin(angle * 3 + SHAPE_SEED) * 0.12 + 
                                         Math.cos(angle * 2) * 0.08;
                const r = radius * (1 + distortionFactor);
                const x = 50 + Math.cos(angle) * r;
                const y = 50 + Math.sin(angle) * r;
                points.push(`${x.toFixed(2)}% ${y.toFixed(2)}%`);
            }
            return `polygon(${points.join(', ')})`;
        }

        for (let i = 0; i < layerCount; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'glass-layer-wrap';
            wrap.style.zIndex = i;
            const layer = document.createElement('div');
            layer.className = 'ring-layer';
            const baseRadius = 50 - (i * (50 / layerCount));
            layer.style.clipPath = generateSmoothPath(baseRadius);
            
            const video = document.createElement('video');
            video.className = 'camera-video';
            video.autoplay = true; video.muted = true; video.playsinline = true;
            
            videoElements.push(video);
            layer.appendChild(video);
            wrap.appendChild(layer);
            system.insertBefore(wrap, system.firstChild);
        }

        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            const globalRotation = x * 100;
            const tiltX = y * 15; const tiltY = -x * 15;
            system.style.transform = `rotate(${globalRotation}deg) perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
            const sheen = document.getElementById('sheen');
            sheen.style.transform = `translate(${x*20}px, ${y*20}px)`;
        });

        initHandDetection();
    </script>
</body>
</html>
